<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Virtual Coin</title>
<!-- Favicon: images/favicon.webp (512x512). Il browser lo scala da solo per
     ogni contesto; apple-touch-icon copre l'icona su iPhone/iPad quando la
     pagina viene aggiunta alla schermata Home. -->
<link rel="icon" type="image/webp" href="images/favicon.webp">
<link rel="apple-touch-icon" href="images/favicon.webp">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --purple:#322d4d;
    --purple-deep:#241f39;
    --purple-light:#4c4472;
    --pink:#da739e;
    --pink-dark:#c2597f;
    --pink-soft:#e6a0bf;
    --green:#34C759;
    --red:#FF3B30;
    --gray:#8E8E93;
    --text:#F4F0F8;
    --text-secondary:rgba(244,240,248,0.62);
    --separator:rgba(255,255,255,0.14);
    --glass-fill:rgba(255,255,255,0.07);
    --glass-fill-strong:rgba(255,255,255,0.13);
    --glass-border:rgba(255,255,255,0.18);
  }
  @font-face{
    font-family: 'VRGfont';
    src: url('fonts/VRGfont.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }
  .brand-title{
    font-family:'VRGfont', -apple-system, sans-serif;
    font-size:30px; text-align:center; letter-spacing:2px;
    margin:0 0 20px; font-weight:400;
    background:linear-gradient(135deg, var(--pink), var(--purple-light));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    height:100%;
    margin:0;
    overflow:hidden;
    touch-action:manipulation;
    -webkit-user-select:none; user-select:none;
    -webkit-touch-callout:none;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display",sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at 15% 10%, rgba(218,115,158,0.30), transparent 45%),
      radial-gradient(circle at 85% 15%, rgba(76,68,114,0.55), transparent 45%),
      radial-gradient(circle at 20% 90%, rgba(218,115,158,0.16), transparent 45%),
      radial-gradient(circle at 90% 85%, rgba(76,68,114,0.40), transparent 45%),
      linear-gradient(180deg, var(--purple), var(--purple-deep));
    background-repeat:no-repeat;
    background-size:100% 100%;
  }
  /* Gli input restano normalmente selezionabili/modificabili — altrimenti
     non si potrebbe scrivere né incollare email, password, ricerca, ecc. */
  input, textarea{
    -webkit-user-select:text; user-select:text;
    -webkit-touch-callout:default;
  }
  #scrollContainer{
    position:absolute; inset:0;
    overflow-y:auto; overflow-x:hidden;
    -webkit-overflow-scrolling:touch;
    overscroll-behavior-y:contain;
    display:flex; justify-content:center;
    padding:calc(24px + env(safe-area-inset-top)) 18px calc(40px + env(safe-area-inset-bottom));
  }
  .wrap{width:100%; max-width:480px; position:relative;}
  .pull-refresh-indicator{
    position:fixed; left:50%; top:calc(10px + env(safe-area-inset-top));
    width:38px; height:38px; margin-left:-19px;
    display:flex; align-items:center; justify-content:center;
    background:var(--glass-fill-strong); backdrop-filter:blur(16px) saturate(180%);
    -webkit-backdrop-filter:blur(16px) saturate(180%);
    border:1px solid var(--glass-border); border-radius:50%;
    color:var(--pink-soft); opacity:0; z-index:90; pointer-events:none;
    box-shadow:0 4px 14px rgba(31,38,135,0.15);
    transition:opacity .15s;
    will-change:transform, opacity;
    transform:translateZ(0);
  }
  /* Durante il trascinamento l'indicatore segue il dito senza transizioni
     (aggiornato via requestAnimationFrame, una sola scrittura per frame);
     al rilascio torna in posizione con una molla morbida. */
  .pull-refresh-indicator.pull-dragging{ transition:none; }
  .pull-refresh-indicator.pull-settling{
    transition:transform .34s cubic-bezier(.34,1.3,.5,1), opacity .2s ease;
  }
  .pull-refresh-indicator svg{width:18px; height:18px;}
  .pull-refresh-indicator.pull-refresh-spinning{animation: pullRefreshSpin .7s linear infinite;}
  @keyframes pullRefreshSpin{ to{ transform:rotate(360deg); } }

  .card{
    background:var(--glass-fill);
    backdrop-filter:blur(24px) saturate(180%);
    -webkit-backdrop-filter:blur(24px) saturate(180%);
    border:1px solid var(--glass-border);
    border-radius:30px; padding:30px 26px;
    box-shadow:0 8px 32px rgba(31,38,135,0.12), inset 0 1px 0 rgba(255,255,255,0.5);
    margin-bottom:16px;
  }
  input[type=text], input[type=password], input[type=number], input[type=datetime-local]{
    width:100%; padding:16px 18px; border-radius:16px; border:1px solid var(--separator);
    background:rgba(255,255,255,0.06); backdrop-filter:blur(8px);
    font-size:17px; color:var(--text); outline:none;
    font-family:inherit; margin-bottom:12px;
  }
  input:focus{border-color:var(--pink); background:rgba(255,255,255,0.10);}
  .field-label{
    font-size:14px; color:var(--text-secondary); font-weight:600;
    margin:0 0 6px 4px; display:block;
  }

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    border:none; border-radius:100px; padding:16px 26px; font-size:17.5px;
    font-weight:600; cursor:pointer; width:100%; font-family:inherit;
    min-height:50px;
    transition:transform .12s, opacity .12s;
    backdrop-filter:blur(12px) saturate(160%);
    -webkit-backdrop-filter:blur(12px) saturate(160%);
  }
  .btn:active{transform:scale(0.97); opacity:.85;}
  .btn-compact{width:auto; padding:17px 36px; font-size:18.5px;}
  /* Pulsante "Prenota" della scheda cliente: più grande e in evidenza. */
  .btn-book{padding:19px 44px; font-size:20px; min-height:60px;}
  .btn-primary{
    background:linear-gradient(180deg, var(--pink-soft), var(--pink-dark));
    color:#fff; box-shadow:0 4px 14px rgba(218,115,158,0.35), inset 0 1px 0 rgba(255,255,255,0.35);
  }
  .btn-secondary{
    background:rgba(255,255,255,0.08); color:var(--pink-soft);
    border:1px solid rgba(255,255,255,0.18);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.10);
  }
  .btn-danger{
    background:rgba(255,59,48,0.15); color:var(--red);
    border:1px solid rgba(255,59,48,0.25);
  }
  .btn-small{width:auto; padding:14px 20px; font-size:15.5px; border-radius:100px; min-height:46px;}
  .btn-row{display:flex; gap:10px; flex-wrap:wrap; margin-top:16px;}
  .btn-row .btn-small{flex:1 1 calc(50% - 5px); min-width:100px;}

  .back-btn{
    width:46px; height:46px; border-radius:50%; border:1px solid var(--glass-border);
    background:var(--glass-fill-strong); backdrop-filter:blur(16px) saturate(180%);
    -webkit-backdrop-filter:blur(16px) saturate(180%);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    box-shadow:0 4px 14px rgba(31,38,135,0.10), inset 0 1px 0 rgba(255,255,255,0.6);
    color:var(--pink-soft); transition:transform .12s;
  }
  .back-btn:active{transform:scale(0.9);}
  .back-btn svg{width:20px; height:20px;}

  /* Header di pagina unificato: titolo sempre centrato, alla stessa altezza
     di un eventuale pulsante indietro a sinistra o azioni a destra (46px). */
  .page-header{
    display:flex; align-items:center; gap:8px;
    min-height:46px; margin-bottom:22px;
  }
  .page-header-title{
    flex:1 1 auto; min-width:0; margin:0; text-align:center;
    line-height:1.15;
  }
  .page-header-side{display:flex; align-items:center; gap:10px; flex:0 0 auto;}

  /* Marchio "VIRTUAL COIN" dentro una frase: font brand, leggermente più
     grande del testo attorno e con il gradiente della testata. */
  .inline-brand{
    font-family:'VRGfont', -apple-system, sans-serif;
    font-size:1.45em; letter-spacing:2px; white-space:nowrap;
    color:#ffffff; display:inline-block; margin-top:6px;
  }
  .coin-status{text-align:center; padding:32px 0;}
  .card.coin-status{padding:44px 30px 40px;}
  .icon-circle{
    width:128px; height:128px; border-radius:50%; margin:0 auto 24px;
    display:flex; align-items:center; justify-content:center;
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.5), 0 6px 18px rgba(0,0,0,0.10);
  }
  .icon-circle svg{width:56px; height:56px;}
  .icon-circle.result-icon{position:relative; overflow:hidden;}
  .result-check{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    opacity:1;
    animation: resultCheckFade .5s cubic-bezier(.4,0,.2,1) 1.1s forwards;
    will-change:transform, opacity;
  }
  .result-coin-static{
    position:absolute; top:50%; left:50%; width:118%; height:118%;
    transform:translate(-50%,-50%);
    object-fit:cover;
    filter:drop-shadow(0 3px 8px rgba(230,160,20,0.35));
    opacity:0;
    animation: resultCoinFadeIn .5s cubic-bezier(.4,0,.2,1) 1.1s forwards;
    will-change:transform, opacity;
  }
  @keyframes resultCheckFade{
    0%{ opacity:1; transform:scale(1); }
    100%{ opacity:0; transform:scale(0.85); }
  }
  @keyframes resultCoinFadeIn{
    0%{ opacity:0; transform:translate(-50%,-50%) scale(0.85); }
    100%{ opacity:1; transform:translate(-50%,-50%) scale(1); }
  }
  .status-title{font-size:28px; font-weight:700; margin:0 0 8px; letter-spacing:-0.4px;}
  .status-title-futuristic{
    font-family:'VRGfont', 'Orbitron', -apple-system, sans-serif;
    font-weight:700; letter-spacing:2px; text-transform:uppercase;
    background:linear-gradient(135deg, #baffc9, var(--green));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 18px rgba(52,199,89,0.35);
  }
  .card-enter{
    animation: cardEnterAnim .5s cubic-bezier(.22,1,.36,1) both;
    will-change:transform, opacity;
  }
  @keyframes cardEnterAnim{
    0%{ opacity:0; transform:translateY(10px) scale(0.98); }
    100%{ opacity:1; transform:translateY(0) scale(1); }
  }
  .status-sub{font-size:15px; color:var(--text-secondary); margin:0 0 22px;}
  .date-block{
    background:rgba(255,255,255,0.06); border:1px solid var(--glass-border);
    border-radius:18px; padding:14px 18px; margin:18px 0 14px; text-align:left;
  }
  .date-row{display:flex; justify-content:space-between; align-items:center; gap:16px; padding:10px 0; font-size:14.5px;}
  .date-row + .date-row{border-top:1px solid var(--separator);}
  .date-row span{color:var(--text-secondary); flex-shrink:0;}
  .date-row strong{font-weight:700; text-align:right; font-size:15px; color:var(--text);}
  .note-text{
    font-size:12px; color:var(--text-secondary); margin:0 0 4px; line-height:1.5;
  }
  .section-divider{
    height:1px; background:var(--separator); margin:22px 0 20px; border:none;
  }
  .coin-id{
    font-size:13px; color:var(--text-secondary); margin-top:18px;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    background:rgba(255,255,255,0.07); display:inline-block; padding:8px 16px; border-radius:100px;
    border:1px solid var(--glass-border);
  }

  /* Scheda cliente adattiva sugli schermi più bassi (es. iPhone 12 e simili):
     riduce spazi e dimensioni per evitare che la scheda superi l'altezza
     visibile e costringa a scorrere per vedere il pulsante finale. */
  @media (max-height: 850px){
    .card.coin-status{padding:26px 24px;}
    .coin-status{padding:20px 0;}
    .icon-circle{width:100px; height:100px; margin-bottom:16px;}
    .icon-circle svg{width:44px; height:44px;}
    .status-title{font-size:24px;}
    .status-sub{margin-bottom:14px;}
    .date-block{margin:12px 0 10px; padding:11px 16px;}
    .date-row{padding:7px 0;}
    .section-divider{margin:14px 0 12px;}
    .coin-id{margin-top:12px;}
    .coin-reveal-stage{width:100px; height:100px; margin-bottom:18px;}
    .coin-reveal-check{width:100px; height:100px;}
    .coin-reveal-check svg{width:44px; height:44px;}
  }
  @media (max-height: 700px){
    .card.coin-status{padding:20px 20px;}
    .coin-status{padding:14px 0;}
    .icon-circle{width:84px; height:84px; margin-bottom:12px;}
    .icon-circle svg{width:38px; height:38px;}
    .status-title{font-size:21px;}
    .status-sub{font-size:14px; margin-bottom:10px;}
    .date-block{margin:10px 0 8px; padding:9px 14px;}
    .date-row{padding:6px 0; font-size:13.5px;}
    .btn-compact{padding:14px 30px; font-size:17px;}
    .btn-book{padding:16px 36px; font-size:18px; min-height:54px;}
    .coin-reveal-stage{width:84px; height:84px; margin-bottom:14px;}
    .coin-reveal-check{width:84px; height:84px;}
    .coin-reveal-check svg{width:38px; height:38px;}
  }

  /* ---------- coriandoli ---------- */
  .confetti-piece{
    position:fixed; border-radius:2px; pointer-events:none;
    will-change:transform, opacity;
    backface-visibility:hidden;
  }

  /* ---------- animazione moneta -> spunta (schermo intero) ---------- */
  .coin-reveal{
    position:fixed; inset:0; z-index:80;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:28px;
  }
  .coin-reveal-stage{
    position:relative; width:128px; height:128px;
    margin:0 auto 26px;
    overflow:visible;
  }
  .coin-reveal-img{
    position:absolute; top:50%; left:50%; width:128%; height:128%;
    transform:translate(-50%,-50%);
    object-fit:cover;
    filter:drop-shadow(0 10px 34px rgba(230,160,20,0.5));
    animation: coinGrowFade 2.1s cubic-bezier(.4,0,.2,1) both;
    will-change:transform, opacity;
    z-index:2;
  }
  .coin-reveal-check{
    position:absolute; top:50%; left:50%; width:128px; height:128px;
    transform:translate(-50%,-50%) scale(0.5); border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:rgba(52,199,89,0.15); color:var(--green);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.5), 0 6px 18px rgba(0,0,0,0.10);
    opacity:0;
    animation: checkPopIn .45s cubic-bezier(.34,1.56,.64,1) 1.8s forwards;
    will-change:transform, opacity;
  }
  .coin-reveal-check svg{width:56px; height:56px;}
  @keyframes coinGrowFade{
    0%{ opacity:0; transform:translate(-50%,-50%) scale(0.6); }
    25%{ opacity:1; transform:translate(-50%,-50%) scale(1); }
    65%{ opacity:1; transform:translate(-50%,-50%) scale(1); }
    100%{ opacity:0; transform:translate(-50%,-50%) scale(1.04); }
  }
  @keyframes checkPopIn{
    0%{ opacity:0; transform:translate(-50%,-50%) scale(0.5); }
    100%{ opacity:1; transform:translate(-50%,-50%) scale(1); }
  }
  .coin-reveal.reveal-exit{
    animation: revealExit .4s ease both;
    will-change:transform, opacity;
  }
  @keyframes revealExit{
    0%{ opacity:1; transform:scale(1); }
    100%{ opacity:0; transform:scale(0.97); }
  }

  .badge{display:inline-block; padding:9px 18px; border-radius:100px; font-size:15px; font-weight:700;}
  .duration-row{
    display:flex; align-items:center; gap:6px; flex-wrap:wrap;
    margin:0 0 14px;
  }
  .duration-row-text{
    display:inline-flex; align-items:center; gap:10px;
    background:rgba(255,255,255,0.09); border:1px solid var(--glass-border);
    border-radius:100px; padding:13px 14px 13px 20px;
    font-size:15.5px; color:var(--text-secondary); flex:0 1 auto; min-width:0;
    cursor:pointer; font-family:inherit; -webkit-tap-highlight-color:transparent;
    transition:transform .12s, opacity .12s;
  }
  .duration-row-text:active{transform:scale(0.97); opacity:.85;}
  .duration-row-text strong{color:var(--text); font-weight:700; font-size:16.5px;}
  /* Icona matita dentro un dischetto rosa: rende evidente che la durata
     si può modificare toccando qui. */
  .duration-row-edit-icon{
    display:inline-flex; align-items:center; justify-content:center;
    width:30px; height:30px; border-radius:50%; flex-shrink:0;
    background:rgba(230,160,191,0.18); border:1px solid rgba(230,160,191,0.35);
    color:var(--pink-soft);
  }
  .duration-row-edit-icon svg{width:15px; height:15px;}
  .icon-btn{
    display:inline-flex; align-items:center; justify-content:center;
    width:44px; height:44px; flex-shrink:0; padding:0;
    background:rgba(255,255,255,0.10); border:1px solid var(--glass-border);
    border-radius:50%; cursor:pointer;
    color:var(--pink-soft); -webkit-tap-highlight-color:transparent;
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.10);
    transition:transform .12s, opacity .12s;
  }
  .icon-btn:active{transform:scale(0.90); opacity:.8;}
  .icon-btn svg{width:20px; height:20px;}
  .stats-pill-btn{
    display:inline-flex; align-items:center; gap:8px;
    background:rgba(255,255,255,0.07); border:1px solid var(--glass-border);
    border-radius:100px; padding:11px 22px 11px 16px;
    color:var(--pink-soft); font-size:15px; font-weight:600;
    font-family:inherit; cursor:pointer; margin:0 0 0 auto;
    -webkit-tap-highlight-color:transparent;
    transition:transform .12s, opacity .12s;
  }
  .stats-pill-btn:active{transform:scale(0.96); opacity:.85;}
  .stats-pill-btn svg{width:18px; height:18px;}
  .badge-green{background:rgba(52,199,89,0.15); color:var(--green);}
  .badge-red{background:rgba(255,59,48,0.15); color:var(--red);}
  .badge-gray{background:rgba(255,255,255,0.10); color:var(--text-secondary);}
  .badge-amber{background:rgba(255,149,0,0.15); color:#ff9f0a;}

  /* ---------- dashboard statistiche ---------- */
  .stats-grid{
    display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:16px;
  }
  .stats-grid-secondary{grid-template-columns:1fr 1fr;}
  @media (min-width: 820px){
    .wrap .stats-grid{max-width:820px; margin-left:auto; margin-right:auto; margin-bottom:16px;}
  }
  .stat-tile{
    background:var(--glass-fill); border:1px solid var(--glass-border);
    border-radius:20px; padding:18px 10px; text-align:center;
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.5), 0 6px 18px rgba(0,0,0,0.10);
  }
  .stat-tile .stat-number{font-size:30px; font-weight:700; color:var(--text); line-height:1.1;}
  .stat-tile .stat-label{font-size:11.5px; color:var(--text-secondary); margin-top:6px; line-height:1.3;}

  /* ---------- calendario mensile (statistiche) ---------- */
  .calendar-weekdays{
    display:grid; grid-template-columns:repeat(7,1fr);
    text-align:center; font-size:11px; color:var(--text-secondary);
    margin-bottom:6px; font-weight:700;
  }
  .calendar-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:4px;}
  .calendar-cell{
    aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    border-radius:10px; position:relative;
    background:none; border:none; padding:0; cursor:pointer;
    font-family:inherit; -webkit-tap-highlight-color:transparent;
    transition:background .15s, transform .12s;
  }
  .calendar-cell:active{transform:scale(0.92);}
  .calendar-cell-selected{
    background:rgba(230,160,191,0.18);
    box-shadow:inset 0 0 0 1.5px var(--pink-soft);
  }
  .calendar-day-info{
    margin:12px 0 0; text-align:center; font-size:13.5px;
    color:var(--text-secondary); min-height:19px;
  }
  .calendar-day-info strong{color:var(--text); font-weight:700; text-transform:capitalize;}
  .calendar-day-info-empty{opacity:0.55; font-style:italic;}
  /* riepilogo del mese per settimane */
  .week-recap{margin-top:18px; padding-top:16px; border-top:1px solid rgba(255,255,255,0.10);}
  .week-recap-row{display:flex; align-items:center; gap:10px; padding:5px 0;}
  .week-recap-range{flex:0 0 88px; font-size:12.5px; color:var(--text-secondary); font-variant-numeric:tabular-nums;}
  .week-recap-bar{flex:1; height:8px; border-radius:4px; background:rgba(255,255,255,0.08); overflow:hidden;}
  .week-recap-bar-fill{
    display:block; height:100%; border-radius:4px;
    background:linear-gradient(90deg, var(--pink-dark), var(--pink-soft));
  }
  .week-recap-count{flex:0 0 26px; text-align:right; font-size:13.5px; font-weight:700; color:var(--text); font-variant-numeric:tabular-nums;}
  .calendar-cell-empty{visibility:hidden;}
  .calendar-nav{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
  .calendar-month-label{flex:1; text-align:center;}
  .icon-btn-sm{width:52px; height:52px;}
  .icon-btn-xs{width:40px; height:40px;}
  .icon-btn-xs svg{width:17px; height:17px;}
  .coin-row-top-right{display:flex; align-items:center; gap:8px; flex-shrink:0;}
  .coin-row-id-row{display:flex; align-items:center; gap:6px;}

  .coin-overflow-item-danger{color:var(--red);}
  .btn-delete-coin{color:var(--red); background:rgba(255,59,48,0.10); border-color:rgba(255,59,48,0.22);}

  /* ---------- grafico stile app Salute ---------- */
  .hc-segmented{margin-bottom:16px;}

    font-size:12px; font-weight:700; letter-spacing:0.6px;

  .hc-avg{font-size:13.5px; color:var(--text-secondary); margin:4px 0 14px;}

    will-change:opacity, transform;
  }

  .hc-chart-wrap{position:relative; padding-top:34px;}
  .hc-tooltip{
    position:absolute; top:0; left:0; z-index:5;
    background:rgba(50,45,77,0.97); border:1px solid rgba(255,255,255,0.18);
    border-radius:12px; padding:7px 12px; white-space:nowrap;
    font-size:12.5px; color:var(--text-secondary); pointer-events:none;
    box-shadow:0 8px 24px rgba(0,0,0,0.30);
    will-change:transform; transition:transform .12s ease-out;
  }
  .hc-tooltip.hidden{display:none;}
  .hc-tip-date{margin-right:8px; text-transform:capitalize;}
  .hc-tip-count{font-weight:700; color:var(--text); font-size:14px;}
  .hc-bar{transition:opacity .15s;}
  .hc-bar-focus{opacity:1 !important;}
  .hc-chart-wrap svg:hover .hc-bar:not(.hc-bar-focus){opacity:0.45;}

  /* ---------- layout pagina statistiche ---------- */
  .stats-content{display:flex; flex-direction:column; gap:16px;}
  .stats-bestcards{display:flex; flex-direction:column; gap:16px;}
  .stats-info-card{text-align:center; padding:16px 18px;}
  .stats-info-value{font-size:15px; color:var(--text); margin:0; font-weight:600;}
  @media (min-width: 820px){
    .wrap .stats-content{max-width:820px; margin:0 auto;}
    /* Sempre righe pari: grafico+calendario affiancati, e sotto le due
       schede "migliore settimana / migliore mese" affiancate. */
    .stats-content{
      display:grid;
      grid-template-columns:1fr 1fr;
      grid-template-areas:
        "chart calendar"
        "bestcards bestcards";
      gap:16px; align-items:stretch;
    }
    .stats-calendar-card{grid-area:calendar;}
    .stats-chart-card{grid-area:chart;}
    .stats-bestcards{
      grid-area:bestcards; margin:0;
      display:grid; grid-template-columns:1fr 1fr; gap:16px;
    }
    .stats-bestcards .card{margin:0;}
  }
  .calendar-day-number{font-size:13px; color:var(--text);}
  .calendar-cell-today{background:linear-gradient(180deg, var(--pink-soft), var(--pink-dark));}
  .calendar-cell-today .calendar-day-number{color:#fff; font-weight:700;}
  .calendar-dot{width:5px; height:5px; border-radius:50%; background:var(--green); margin-top:3px;}
  .calendar-cell-today .calendar-dot{background:#fff;}

  h1{font-size:30px; margin:0 0 4px; letter-spacing:-0.5px;}
  .admin-header{display:flex; justify-content:space-between; align-items:center; margin-bottom:22px; gap:10px;}
  .header-actions{display:flex; align-items:center; gap:10px; flex-shrink:0;}
  .server-led{
    width:12px; height:12px; border-radius:50%; flex-shrink:0;
    background:var(--text-secondary); border:2px solid var(--purple-deep);
    transition:background .2s;
  }
  /* LED stato server da solo nell'header, accanto a "Esci": un piccolo
     respiro luminoso quando è tutto ok, fermo e rosso se il server non
     risponde. */
  .server-led-standalone{margin-left:10px; display:inline-block; vertical-align:middle;}
  /* Header admin su una riga: titolo+LED a sinistra, menu ⋯ ed Esci a
     destra. Il menu raccoglie le azioni secondarie, in stile iOS. */
  .admin-header{
    display:flex; align-items:center; justify-content:space-between;
    gap:12px; margin-bottom:20px; min-height:52px;
  }
  .admin-title{
    font-family:'VRGfont', -apple-system, sans-serif;
    font-size:clamp(14px, 4.6vw, 19px);
    letter-spacing:1.2px; color:#ffffff;
    margin:0; flex:1 1 auto; min-width:0;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .admin-actions{display:flex; align-items:center; gap:10px; flex:0 0 auto;}
  .admin-actions .btn-small{white-space:nowrap;}

  /* ---------- menu a tendina stile iOS ---------- */
  .ios-menu-anchor{position:relative;}
  .ios-menu{
    position:absolute; top:calc(100% + 8px); right:0; z-index:60;
    min-width:224px; overflow:hidden;
    background:rgba(58,52,89,0.85);
    backdrop-filter:blur(28px) saturate(170%);
    -webkit-backdrop-filter:blur(28px) saturate(170%);
    border:1px solid rgba(255,255,255,0.16);
    border-radius:14px;
    box-shadow:0 14px 40px rgba(0,0,0,0.38), inset 0 1px 0 rgba(255,255,255,0.10);
    transform-origin:top right;
    animation:iosMenuIn .26s cubic-bezier(.34,1.4,.64,1) both;
    will-change:transform, opacity;
  }
  .ios-menu.ios-menu-closing{animation:iosMenuOut .14s ease both;}
  @keyframes iosMenuIn{
    from{transform:scale(0.6); opacity:0;}
    to{transform:scale(1); opacity:1;}
  }
  @keyframes iosMenuOut{
    from{transform:scale(1); opacity:1;}
    to{transform:scale(0.9); opacity:0;}
  }
  .ios-menu-item{
    display:flex; align-items:center; justify-content:space-between; gap:28px;
    width:100%; padding:14px 16px; background:none; border:none;
    font-family:inherit; font-size:16px; color:var(--text); text-align:left;
    cursor:pointer; -webkit-tap-highlight-color:transparent;
    transition:background .12s;
  }
  .ios-menu-item:active{background:rgba(255,255,255,0.10);}
  .ios-menu-item + .ios-menu-item{border-top:1px solid rgba(255,255,255,0.09);}
  .ios-menu-item-icon{display:inline-flex; color:var(--text-secondary); flex-shrink:0;}
  .ios-menu-item-icon svg{width:19px; height:19px;}
  @keyframes ledBreath{
    0%,100%{opacity:1;}
    50%{opacity:0.55;}
  }
  .server-led-standalone.server-led-online{animation:ledBreath 3s ease-in-out infinite; will-change:opacity;}
  .server-led.server-led-online{background:var(--green);}
  .server-led.server-led-offline{background:var(--red);}
  .coin-row{
    background:var(--glass-fill);
    border:1px solid var(--glass-border);
    border-radius:20px; padding:16px 18px; margin-bottom:12px;
    box-shadow:0 4px 16px rgba(31,38,135,0.08);
  }
  .coin-row-top{display:flex; justify-content:space-between; align-items:center; gap:8px;}
  .coin-row-id{font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:17px; font-weight:700;}
  .coin-row .btn-row{margin-top:12px; gap:8px;}
  .coin-row .btn-row .btn-small{
    padding:14px 17px; font-size:15.5px; min-height:49px; min-width:0;
    backdrop-filter:none; -webkit-backdrop-filter:none;
  }
  .coin-row-label{font-size:13.5px; color:var(--text-secondary); margin-top:2px;}
  .coin-row-meta{font-size:13.5px; color:var(--text-secondary); margin-top:10px; line-height:1.6;}
  .coin-row-duration{color:var(--text); font-weight:700;}
  .hidden{display:none !important;}
  .loading{text-align:center; color:var(--text-secondary); padding:40px 0; font-size:14px;}
  .error-text{color:var(--red); font-size:13px; margin-top:6px;}
  .inline-panel{margin-top:12px; padding-top:12px; border-top:1px solid var(--separator);}
  .top-actions{display:flex; gap:8px; margin-bottom:16px;}
  .top-actions .btn{width:auto; flex:1;}
  .modal-overlay{
    position:fixed; inset:0; background:rgba(20,17,32,0.55); backdrop-filter:blur(6px);
    display:flex; align-items:center; justify-content:center; z-index:100; padding:20px;
    animation: modalOverlayFadeIn .22s ease both;
    will-change:opacity;
  }
  .modal-box{
    background:rgba(50,45,77,0.92); backdrop-filter:blur(28px) saturate(180%);
    -webkit-backdrop-filter:blur(28px) saturate(180%);
    border:1px solid rgba(255,255,255,0.22);
    border-radius:24px; padding:26px; width:100%; max-width:340px; text-align:center;
    box-shadow:0 16px 48px rgba(0,0,0,0.45);
    animation: modalBoxPopIn .32s cubic-bezier(.34,1.56,.64,1) both;
    will-change:transform, opacity;
  }
  @keyframes modalOverlayFadeIn{
    0%{ opacity:0; }
    100%{ opacity:1; }
  }
  @keyframes modalBoxPopIn{
    0%{ opacity:0; transform:scale(0.92) translateY(10px); }
    100%{ opacity:1; transform:scale(1) translateY(0); }
  }
  .modal-overlay.closing{ animation: modalOverlayFadeOut .2s ease both; }
  .modal-overlay.closing .modal-box{ animation: modalBoxPopOut .2s cubic-bezier(.4,0,1,1) both; }
  @keyframes modalOverlayFadeOut{
    0%{ opacity:1; }
    100%{ opacity:0; }
  }
  @keyframes modalBoxPopOut{
    0%{ opacity:1; transform:scale(1) translateY(0); }
    100%{ opacity:0; transform:scale(0.92) translateY(10px); }
  }
  .modal-box p{font-size:16px; color:var(--text); line-height:1.5; margin:8px 0 22px; font-weight:500;}
  .qr-wrap{
    width:200px; height:200px; margin:0 auto 16px;
    background:#fff; border-radius:16px; padding:12px;
    box-shadow:0 4px 16px rgba(0,0,0,0.25);
  }
  .qr-wrap svg{width:100%; height:100%; display:block;}
  .notice{
    background:rgba(218,115,158,0.12); color:var(--pink-soft); font-size:12px; padding:10px 14px;
    border-radius:14px; margin-bottom:16px; text-align:center;
    border:1px solid rgba(218,115,158,0.25);
  }

  /* ---------- layout desktop: schede monete "a mattoncini" (stile Pinterest) ---------- */
  @media (min-width: 820px){
    .wrap{max-width:960px;}
    .wrap > .page-header, .wrap > .card, .wrap > .top-actions{
      max-width:480px; margin-left:auto; margin-right:auto;
    }
    /* Colonne fluide, ogni card alta quanto il suo contenuto — niente più
       righe "sfalsate" per via di card con più o meno pulsanti. */
    #coinList:not(.coin-list-as-list){
      column-width:320px;
      column-gap:16px;
    }
    #coinList:not(.coin-list-as-list) .coin-row{
      break-inside:avoid;
      margin-bottom:16px;
      display:inline-block;
      width:100%;
    }
    #coinList:not(.coin-list-as-list) .coin-list-empty{
      column-span:all;
      font-size:17px;
    }
    #coinList.coin-list-as-list{
      max-width:600px; margin-left:auto; margin-right:auto;
    }
  }
  #coinList .coin-list-empty{text-align:center; font-size:15px;}
  #coinList.list-fade-in{animation: listFadeIn .28s cubic-bezier(.4,0,.2,1) both; will-change:transform, opacity;}
  @keyframes listFadeIn{
    0%{ opacity:0; transform:translateY(5px); }
    100%{ opacity:1; transform:translateY(0); }
  }

  /* ---------- segmented control ---------- */
  .segmented{
    position:relative;
    display:flex; background:rgba(255,255,255,0.06); border-radius:100px;
    padding:4px; gap:4px; margin-bottom:18px;
    touch-action:pan-y; user-select:none; -webkit-user-select:none;
  }
  .segmented button{
    position:relative; z-index:1;
    flex:1; padding:13px 6px; border:none; border-radius:100px; background:transparent;
    color:var(--text-secondary); font-weight:600; font-size:14.5px; cursor:pointer;
    font-family:inherit; transition:color .2s;
  }
  .segmented button.active{ color:#fff; }
  .segmented-thumb{
    position:absolute; top:4px; bottom:4px; left:4px; z-index:0;
    border-radius:100px;
    background:linear-gradient(180deg, var(--pink-soft), var(--pink-dark));
    transition:transform .28s cubic-bezier(.4,0,.2,1), width .28s cubic-bezier(.4,0,.2,1);
    will-change:transform, width;
    transform:translateZ(0);
  }
  .list-controls-row{display:flex; align-items:flex-start; gap:8px;}
  .list-controls-row .segmented{flex:1; margin-bottom:18px;}
  @keyframes viewTogglePop{
    0%{transform:rotate(-90deg) scale(0.7); opacity:0.4;}
    100%{transform:rotate(0deg) scale(1); opacity:1;}
  }
  .view-toggle-pop svg{animation:viewTogglePop .32s cubic-bezier(.34,1.56,.64,1) both; will-change:transform, opacity;}
  .view-toggle{
    position:relative;
    display:flex; background:rgba(255,255,255,0.06); border-radius:100px;
    padding:4px; gap:4px; flex-shrink:0;
  }
  .view-toggle button{
    position:relative; z-index:1;
    display:flex; align-items:center; justify-content:center;
    width:44px; height:44px; border:none; border-radius:100px; background:transparent;
    color:var(--text-secondary); cursor:pointer; -webkit-tap-highlight-color:transparent;
    transition:color .2s;
  }
  .view-toggle button svg{width:19px; height:19px;}
  .view-toggle button.active{ color:#fff; }
  /* vista "elenco": una colonna sola, righe più compatte, anche su desktop */
  /* Vista "elenco": un unico contenitore con bordo/sfondo, righe piatte
     separate da una linea sottile — non tante mini-card rimpicciolite. */
  #coinList.coin-list-as-list{
    display:block !important;
    background:var(--glass-fill); backdrop-filter:blur(14px) saturate(160%);
    -webkit-backdrop-filter:blur(14px) saturate(160%);
    border:1px solid var(--glass-border); border-radius:18px;
    padding:2px 16px; box-shadow:0 4px 16px rgba(31,38,135,0.08);
  }
  #coinList.coin-list-as-list .coin-row{
    background:none; border:none; box-shadow:none; border-radius:0;
    padding:14px 0; margin-bottom:0;
    border-bottom:1px solid var(--separator);
  }
  #coinList.coin-list-as-list .coin-row:last-child{border-bottom:none;}
  #coinList.coin-list-as-list .coin-row-top{cursor:pointer;}
  #coinList.coin-list-as-list .coin-row-id{font-size:15px;}
  #coinList.coin-list-as-list .coin-row-label{font-size:12px;}
  /* L'altezza esatta viene misurata in JS al momento del tap: la
     transizione copre così l'intera durata (niente cap fisso a 220px che
     "falsava" la curva di easing, finendo in anticipo all'apertura e
     partendo in ritardo alla chiusura). */
  #coinList.coin-list-as-list .coin-row-details{
    max-height:0; overflow:hidden;
    transition:max-height .32s cubic-bezier(.4,0,.2,1), opacity .28s ease;
    opacity:0;
  }
  #coinList.coin-list-as-list .coin-row.expanded .coin-row-details{
    /* --details-h è l'altezza reale misurata in JS al tap; il fallback
       copre il primo render. Regola valida solo in vista elenco: in vista
       a schede i dettagli restano sempre visibili come prima. */
    max-height:var(--details-h, 480px);
    opacity:1;
  }
  #coinList.coin-list-as-list .coin-row-meta{margin-top:12px; line-height:1.4; font-size:12.5px;}
  #coinList.coin-list-as-list .btn-row{margin-top:10px; gap:8px; flex-wrap:wrap;}
  #coinList.coin-list-as-list .btn-row .btn-small{
    flex:1 1 0; min-width:105px; padding:12px 16px; font-size:14px; min-height:44px;
    border-radius:100px; letter-spacing:0.1px;
    backdrop-filter:none; -webkit-backdrop-filter:none;
  }
  #coinList.coin-list-as-list .badge{padding:6px 14px; font-size:13px;}
  #coinList.coin-list-as-list .coin-list-empty{padding:24px 0;}
  .coin-row-chevron{display:none;}
  #coinList.coin-list-as-list .coin-row-chevron{
    display:flex; align-items:center; color:var(--text-secondary);
    transition:transform .28s cubic-bezier(.4,0,.2,1);
    will-change:transform;
  }
  #coinList.coin-list-as-list .coin-row-chevron svg{width:15px; height:15px;}
  #coinList.coin-list-as-list .coin-row.expanded .coin-row-chevron{
    transform:rotate(180deg); color:var(--pink-soft);
  }

  /* ---------- drum picker ---------- */
  .drum-wrapper{ position:relative; height:154px; margin-bottom:20px; }
  .drum{
    height:154px; overflow-y:scroll; scroll-snap-type:y mandatory;
    -webkit-overflow-scrolling:touch; padding:55px 0;
    scrollbar-width:none;
  }
  .drum::-webkit-scrollbar{ display:none; }
  .drum-item{
    height:44px; display:flex; align-items:center; justify-content:center;
    scroll-snap-align:center; font-size:19px; color:var(--text-secondary);
    font-variant-numeric:tabular-nums;
  }
  .drum-item.selected{ color:var(--text); font-weight:700; font-size:25px; }
  .drum-highlight{
    position:absolute; top:55px; left:0; right:0; height:44px;
    border-top:1px solid var(--glass-border); border-bottom:1px solid var(--glass-border);
    background:rgba(255,255,255,0.05); border-radius:12px; pointer-events:none;
  }
</style>

        var b = bin.read();
        if (b == -1) throw 'eof';
        return b;

      var unicodeMap = {};
      while (true) {
        var b0 = bin.read();
        if (b0 == -1) break;
        var b1 = read();
        var b2 = read();
        var b3 = read();
        var k = String.fromCharCode( (b0 << 8) | b1);
        var v = (b2 << 8) | b3;
        unicodeMap[k] = v;
        count += 1;
      }
      if (count != numChars) {
        throw count + ' != ' + numChars;
      }

      return unicodeMap;
    }();

    return function(s) {
      var bytes = [];
      for (var i = 0; i < s.length; i += 1) {
        var c = s.charCodeAt(i);
        if (c < 128) {
          bytes.push(c);
        } else {

              bytes.push(b & 0xff);

          }

      }

// Wrapper attorno a fetch con timeout: se il server non risponde entro il
// tempo limite, la richiesta viene interrotta e lancia un errore invece di
// restare bloccata per sempre (evita schermate "Verifica in corso…" fisse).
async function fetchWithTimeout(url, options = {}, timeoutMs = 12000){
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try{
    return await fetch(url, { ...options, signal: controller.signal });
  }catch(e){
    if(e.name === "AbortError"){
      throw new Error("Timeout: il server non risponde.");
    }
    throw e;
  }finally{
    clearTimeout(timer);
  }
}

  const newId = () => (crypto.randomUUID ? crypto.randomUUID() : (Date.now().toString(36) + Math.random().toString(36).slice(2)));

// Posiziona (con transizione CSS) la "pillola" scorrevole di un segmented
// control sul pulsante attivo — usata sia dal filtro di stato che dal
// selettore vista a schede/elenco.
// Tiene la pillola dei segmented control allineata anche quando cambia lo
// spazio disponibile (rotazione schermo, ridimensionamento finestra, caricamento
// di un font che sposta leggermente il testo) — altrimenti resta larga/posizionata
// secondo una misura ormai vecchia, sembrando "allungata" o storta.
// Gesto "tira giù per aggiornare" sulla lista monete — attivo solo quando si
// è già in cima allo scroll e la lista coin è quella mostrata (non su altre
// schermate come Statistiche o login). Chiamata una sola volta all'avvio,
// perché #scrollContainer è fisso e non viene mai ricreato.
function setupPullToRefresh(){
  const container = document.getElementById("scrollContainer");
  if(!container) return;

  const indicator = document.createElement("div");
  indicator.className = "pull-refresh-indicator";
  indicator.innerHTML = icons.refresh;
  document.body.appendChild(indicator);

  const threshold = 68;
  let startY = 0, pulling = false, currentPull = 0;
  // Gli eventi touchmove possono arrivare più veloci del refresh dello schermo:
  // la posizione viene solo memorizzata qui e scritta sul DOM una volta sola
  // per frame dentro requestAnimationFrame — mai più di una paint per frame.
  let rafId = 0, pendingFrame = false;

  function paintIndicator(){
    pendingFrame = false;
    indicator.style.transform = `translate3d(0, ${currentPull}px, 0) rotate(${currentPull * 3}deg)`;
    indicator.style.opacity = String(Math.min(currentPull / threshold, 1));
  }
  function scheduleIndicatorPaint(){
    if(pendingFrame) return;
    pendingFrame = true;
    rafId = requestAnimationFrame(paintIndicator);
  }
  function settleIndicator(pullY, opacity){
    // Il ritorno in posizione usa la transizione "a molla" definita in CSS
    // (.pull-settling), che gira sul compositor: fluida anche sotto carico.
    indicator.classList.remove("pull-dragging");
    indicator.classList.add("pull-settling");
    indicator.style.transform = `translate3d(0, ${pullY}px, 0)`;
    indicator.style.opacity = String(opacity);
  }

  container.addEventListener("touchstart", (e) => {
    if(e.touches.length === 1 && container.scrollTop <= 0 && document.getElementById("coinList")){
      startY = e.touches[0].clientY;
      pulling = true;
      currentPull = 0;
      indicator.classList.remove("pull-settling");
      indicator.classList.add("pull-dragging");
    }else{
      pulling = false;
    }
  }, { passive: true });

  container.addEventListener("touchmove", (e) => {
    if(!pulling) return;
    const delta = e.touches[0].clientY - startY;
    // Sopra una piccola soglia di movimento, prendo "possesso" del gesto:
    // evita che il browser lo interpreti ANCHE come suo (es. il
    // pull-to-refresh nativo integrato in Chrome su Android, o il rimbalzo
    // di Safari), che altrimenti scatterebbe in parallelo al nostro.
    if(delta > 5){
      e.preventDefault();
      currentPull = Math.min(delta * 0.5, 90);
      scheduleIndicatorPaint();
    }
  }, { passive: false });

  container.addEventListener("touchend", () => {
    if(!pulling) return;
    pulling = false;
    if(pendingFrame){ cancelAnimationFrame(rafId); pendingFrame = false; }
    if(currentPull >= threshold){
      settleIndicator(44, 1);
      indicator.classList.add("pull-refresh-spinning");
      loadCoinList().finally(() => {
        indicator.classList.remove("pull-refresh-spinning");
        settleIndicator(0, 0);
      });
    }else{
      settleIndicator(0, 0);
    }
    currentPull = 0;
  });
}

// scorrendo il dito, la pillola rosa segue e scatta di opzione in opzione

// viene applicata. Un tocco secco continua a funzionare come prima.
function makeSegmentedDraggable(seg, commit){
  if(!seg) return;

  function btnAt(clientX){
    let best = null, bestDist = Infinity;
    btns().forEach(b => {
      const r = b.getBoundingClientRect();
      const d = Math.abs(clientX - (r.left + r.width / 2));
      if(d < bestDist){ bestDist = d; best = b; }
    });
    return best;
  }
  function highlight(clientX){
    const b = btnAt(clientX);
    if(b && b !== lastBtn){
      lastBtn = b;
      btns().forEach(x => x.classList.toggle("active", x === b));
      positionSegmentedThumb(seg);
    }
  }
  seg.addEventListener("pointerdown", e => {
    dragging = true;
    startBtn = seg.querySelector("button.active");
    lastBtn = startBtn;
    if(seg.setPointerCapture) try{ seg.setPointerCapture(e.pointerId); }catch(_){}
    highlight(e.clientX);
  });
  seg.addEventListener("pointermove", e => { if(dragging) highlight(e.clientX); });
  seg.addEventListener("pointerup", () => {
    if(!dragging) return;
    dragging = false;
    if(lastBtn && lastBtn !== startBtn) commit(lastBtn);
  });
  seg.addEventListener("pointercancel", () => {
    // gesto interrotto (es. lo scroll ha preso il controllo): torna indietro
    if(dragging && startBtn){
      btns().forEach(x => x.classList.toggle("active", x === startBtn));
      positionSegmentedThumb(seg);
    }
    dragging = false;
  });
}

function setupSegmentedResizeSync(){
  const realign = () => {
    positionSegmentedThumb(document.getElementById("coinFilterSegmented"), true);
  };
  if(window.ResizeObserver){
    const observer = new ResizeObserver(realign);
    document.querySelectorAll(".segmented").forEach(el => observer.observe(el));
  }else{
    window.addEventListener("resize", realign);
  }
  if(document.fonts && document.fonts.ready){
    document.fonts.ready.then(realign);
  }
}

function positionSegmentedThumb(container, instant){
  if(!container) return;
  const thumb = container.querySelector(".segmented-thumb");
  const activeBtn = container.querySelector("button.active");
  if(!thumb || !activeBtn) return;
  if(instant) thumb.style.transition = "none";
  thumb.style.width = activeBtn.offsetWidth + "px";
  // translate3d tiene la pillola su un layer del compositor: lo scorrimento
  // tra un segmento e l'altro resta fluido anche durante altri lavori JS.
  thumb.style.transform = `translate3d(${activeBtn.offsetLeft - 4}px, 0, 0)`;
  if(instant){
    thumb.offsetHeight; // forza il browser ad applicare subito la posizione, senza animarla
    thumb.style.transition = "";
  }
}

const CODE_CHARSET = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // esclude 0/O/1/I per evitare ambiguità
const CODE_LENGTH = 10;

function computeChecksum(body){
  let sum = 0;
  for(let i = 0; i < body.length; i++){
    sum += CODE_CHARSET.indexOf(body[i]) * (i + 7);
  }
  return CODE_CHARSET[sum % CODE_CHARSET.length];
}

function generateCoinId(){
  let body = "";
  for(let i = 0; i < CODE_LENGTH - 1; i++){
    body += CODE_CHARSET[Math.floor(Math.random() * CODE_CHARSET.length)];
  }
  return body + computeChecksum(body);
}

function isValidCoinFormat(id){
  if(typeof id !== "string" || id.length !== CODE_LENGTH) return false;
  const upper = id.toUpperCase();
  for(const ch of upper){
    if(!CODE_CHARSET.includes(ch)) return false;
  }
  const body = upper.slice(0, CODE_LENGTH - 1);
  const checksum = upper.slice(CODE_LENGTH - 1);
  return computeChecksum(body) === checksum;
}

function buildCoinUrl(code){
  const base = window.location.origin + window.location.pathname;
  return `${base}?c=${code}`;
}

// Genera un QR code come stringa SVG, usando la libreria qrcode-generator
// incorporata sopra (nessuna dipendenza esterna, nessuna chiamata di rete).
function generateQrSvg(text){
  const qr = qrcode(0, "M"); // 0 = dimensione automatica, M = correzione errori media
  qr.addData(text);
  qr.make();
  return qr.createSvgTag({ scalable: true, cellSize: 4, margin: 4 });
}

function effectiveExpiry(coin){

function fmtDateTime(iso){
  if(!iso) return "—";
  return new Date(iso).toLocaleString("it-IT", { dateStyle:"long", timeStyle:"medium" });
}

function launchConfetti(){
  const colors = ["#007AFF","#34C759","#FF9500","#FF3B30","#AF52DE","#FFD60A","#5AC8FA","#FF2D55","#30D158"];
  const container = document.createElement("div");
  container.style.position = "fixed";
  container.style.inset = "0";
  container.style.pointerEvents = "none";
  container.style.zIndex = "9999";
  document.body.appendChild(container);

  const count = 150;
  let maxTotalTime = 0;

  for(let i = 0; i < count; i++){
    const piece = document.createElement("div");
    piece.className = "confetti-piece";
    const size = 6 + Math.random() * 7;
    piece.style.width = size + "px";
    piece.style.height = (size * 1.6) + "px";
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.left = (Math.random() * 100) + "vw";
    piece.style.top = "-20px";
    container.appendChild(piece);

    // Caduta naturale: leggero ondeggiamento laterale invece di un tragitto rettilineo,
    // come farebbe un vero coriandolo cadendo nell'aria.
    const fallDistance = window.innerHeight + 60;
    const swayAmount = 30 + Math.random() * 50;
    const swayDirection = Math.random() < 0.5 ? 1 : -1;
    const rotation = (Math.random() < 0.5 ? 1 : -1) * (280 + Math.random() * 400);
    const duration = 3200 + Math.random() * 2200;
    const delay = Math.random() * 900;

    // translate3d forza subito il pezzo su un layer del compositor: tutta la
    // caduta (transform + opacity) gira fuori dal main thread, a piena
    // frequenza di schermo anche mentre il JS è occupato.
    const anim = piece.animate([
      { transform: "translate3d(0px, 0px, 0) rotate(0deg)", opacity: 1, offset: 0 },
      { transform: `translate3d(${swayDirection * swayAmount}px, ${fallDistance * 0.35}px, 0) rotate(${rotation * 0.3}deg)`, opacity: 1, offset: 0.35 },
      { transform: `translate3d(${-swayDirection * swayAmount * 0.6}px, ${fallDistance * 0.7}px, 0) rotate(${rotation * 0.7}deg)`, opacity: 1, offset: 0.7 },
      { transform: `translate3d(${swayDirection * swayAmount * 0.3}px, ${fallDistance}px, 0) rotate(${rotation}deg)`, opacity: 0, offset: 1 }
    ], {
      duration,
      delay,
      easing: "ease-in",
      fill: "forwards"
    });
    // Ogni coriandolo viene tolto dal DOM appena atterra: i layer si liberano
    // man mano invece di restare tutti e 150 vivi fino all'ultimo pezzo.
    anim.onfinish = () => piece.remove();

    maxTotalTime = Math.max(maxTotalTime, duration + delay);
  }

  setTimeout(() => container.remove(), maxTotalTime + 200);
}

async function renderCoinView(coinId){
  // Ripulisce subito la barra indirizzi: il codice serve solo un istante
  // per identificare la moneta, poi spariscono dall'URL visibile.
  if(window.history && window.history.replaceState){
    window.history.replaceState(null, "", window.location.pathname);
  }

  if(!isValidCoinFormat(coinId)){
    app.innerHTML = `<div class="card coin-status card-enter">
      <div class="icon-circle" style="background:rgba(255,59,48,0.15);color:var(--red)">${icons.x}</div>
      <p class="status-title">VirtualCoin non riconosciuta</p>
      <p class="status-sub">Formato ID non valido.</p>
      <div class="coin-id">${coinId}</div>
    </div>`;
    return;
  }

  app.innerHTML = `<div class="loading">Verifica in corso…</div>`;

  let coin;
  try{
    coin = await sbSelectCoin(coinId);
  }catch(e){
    app.innerHTML = `<div class="card coin-status card-enter">
      <div class="icon-circle" style="background:rgba(255,59,48,0.15);color:var(--red)">${icons.x}</div>
      <p class="status-title">Errore di connessione</p>
      <p class="status-sub">Impossibile contattare il server. Riprova.</p>
    </div>`;
    return;
  }

  let isFirstActivation = false;

  if(!coin){
    try{
      const inserted = await sbInsertCoin(coinId, { device_id: getDeviceId() });
      // Fallback: se la policy RLS non permette di rileggere la riga appena
      // creata, Supabase risponde comunque "OK" ma senza dati. In quel caso
      // continuiamo con un oggetto locale coerente con quanto appena scritto,
      // invece di lasciare "coin" undefined e mandare in crash il resto.
      coin = inserted || { id: coinId, device_id: getDeviceId(), first_scan_at: null, expires_at: null, session_code: null };
      isFirstActivation = true;
    }catch(e){
      coin = await sbSelectCoin(coinId).catch(() => null);
      if(!coin){
        app.innerHTML = `<div class="card coin-status card-enter">
          <div class="icon-circle" style="background:rgba(255,59,48,0.15);color:var(--red)">${icons.x}</div>
          <p class="status-title">Errore</p>
          <p class="status-sub">Non è stato possibile registrare questa VirtualCoin.</p>
        </div>`;
        return;
      }
    }
  }else if(!coin.first_scan_at){
    try{
      const nowIso = new Date().toISOString();
      const myDeviceId = getDeviceId();
      const updated = await sbUpdateCoin(coinId, { first_scan_at: nowIso, device_id: myDeviceId });
      coin = updated || { ...coin, first_scan_at: nowIso, device_id: myDeviceId };
      isFirstActivation = true;
    }catch(e){
      app.innerHTML = `<div class="card coin-status card-enter">
        <div class="icon-circle" style="background:rgba(255,59,48,0.15);color:var(--red)">${icons.x}</div>
        <p class="status-title">Errore</p>
        <p class="status-sub">Non è stato possibile attivare questa VirtualCoin.</p>
      </div>`;
      return;
    }
  }

  // Moneta già attivata in precedenza: verifica che sia lo stesso dispositivo
  // che l'ha attivata la prima volta, per evitare che il link condiviso mostri
  // "Attiva" anche su telefoni diversi da quello del possessore originale.
  if(!isFirstActivation){
    const myDeviceId = getDeviceId();
    if(!coin.device_id){
      // Moneta senza dispositivo agganciato (creata prima di questa funzione,
      // oppure sbloccata dallo staff dal pannello admin): la lega a questo dispositivo,
      // ma solo se nessun altro telefono l'ha già fatto nel frattempo (scrittura atomica).
      try{
        const updated = await sbUpdateCoinIfDeviceNull(coinId, { device_id: myDeviceId });
        if(updated){
          coin = updated;
        }else{
          // Nessuna riga tornata indietro: o un altro dispositivo ha vinto la
          // corsa nel frattempo, oppure (più spesso) la scrittura è andata a
          // buon fine ma la policy RLS blocca la rilettura per l'anonimo.
          // Verifichiamo lo stato reale con una lettura pulita prima di bloccare.
          const recheck = await sbSelectCoin(coinId).catch(() => null);
          if(recheck && recheck.device_id && recheck.device_id !== myDeviceId){
            app.innerHTML = `<div class="card coin-status card-enter">
              <div class="icon-circle" style="background:rgba(255,59,48,0.15);color:var(--red)">${icons.x}</div>
              <p class="status-title">Dispositivo non riconosciuto</p>
              <p class="status-sub">Questa VirtualCoin risulta già collegata a un altro dispositivo.</p>
            </div>`;
            return;
          }
          coin = recheck || { ...coin, device_id: myDeviceId };
        }
      }catch(e){ /* errore di rete: si procede comunque mostrando la scheda con i dati che abbiamo */ }
    }else if(coin.device_id !== myDeviceId){
      app.innerHTML = `<div class="card coin-status card-enter">
        <div class="icon-circle" style="background:rgba(255,59,48,0.15);color:var(--red)">${icons.x}</div>
        <p class="status-title">Dispositivo non riconosciuto</p>
        <p class="status-sub">Questa VirtualCoin risulta già collegata a un altro dispositivo.</p>
      </div>`;
      return;
    }
  }

  drawCoinStatus(coin, isFirstActivation);
}

function drawCoinStatus(coin, isFirstActivation){
  if(!coin){
    app.innerHTML = `<div class="card coin-status card-enter">
      <div class="icon-circle" style="background:rgba(255,59,48,0.15);color:var(--red)">${icons.x}</div>
      <p class="status-title">Errore</p>
      <p class="status-sub">Non è stato possibile leggere i dati di questa VirtualCoin. Riprova tra qualche istante.</p>
    </div>`;
    return;
  }

  const expiry = effectiveExpiry(coin);
  const now = new Date();

  if(!expiry || now >= expiry){
    app.innerHTML = `<div class="card coin-status card-enter">
      <div class="icon-circle" style="background:rgba(255,59,48,0.15);color:var(--red)">${icons.x}</div>
      <p class="status-title">Scaduta</p>
      <p class="status-sub">La validità di questa VirtualCoin è terminata.</p>
      <div class="coin-id">${coin.session_code || fakeDisplayCode(coin.id)}</div>
    </div>`;
    return;
  }

  // Solo alla PRIMA attivazione: coriandoli + popup -> animazione moneta -> scheda.
  // Dalle visite successive: scheda diretta, senza animazioni, moneta già ferma.
  if(isFirstActivation){
    launchConfetti();
    showWelcomePopup(() => {
      playCoinRevealAnimation(() => renderActiveCard(coin, expiry, true));
    });
  }else{
    renderActiveCard(coin, expiry, false);
  }
}

   DURATA DI DEFAULT — display + drum picker
   ============================================================ */
let currentDefaultValue = 60;
let currentDefaultUnit = "days"; // 'days' | 'weeks' | 'months'

const UNIT_LABELS = {
  days:   { singular: "giorno",    plural: "giorni" },
  weeks:  { singular: "settimana", plural: "settimane" },
  months: { singular: "mese",      plural: "mesi" }
};

const SEGMENT_TO_PGUNIT = { giorni: "days", settimane: "weeks", mesi: "months" };
const PGUNIT_TO_SEGMENT = { days: "giorni", weeks: "settimane", months: "mesi" };

function formatDurationDisplay(value, unit){
  if(unit === "months" && value % 12 === 0){
    const years = value / 12;
    return `${years} ${years === 1 ? "anno" : "anni"}`;
  }
  const l = UNIT_LABELS[unit] || UNIT_LABELS.days;
  return `${value} ${value === 1 ? l.singular : l.plural}`;
}

// Verifica rapida se Supabase risponde, per accendere il LED verde/rosso
// vicino a "Esci". Una richiesta leggera (1 riga, nessun dato reale serve).
async function checkServerStatus(){
  const led = document.getElementById("serverLed");
  if(!led) return;
  try{
    const res = await fetchWithTimeout(`${SUPABASE_URL}/rest/v1/${TABLE}?select=id&limit=1`, { headers: authHeaders(), cache: "no-store" }, 6000);
    led.classList.toggle("server-led-online", res.ok);
    led.classList.toggle("server-led-offline", !res.ok);
    led.title = res.ok ? "Server online" : "Server non raggiungibile";
  }catch(e){
    led.classList.remove("server-led-online");
    led.classList.add("server-led-offline");
    led.title = "Server non raggiungibile";
  }
}

async function loadDefaultDuration(){
  const display = document.getElementById("currentDurationDisplay");
  try{
    const value = await sbGetSetting("default_duration_value");
    const unit = await sbGetSetting("default_duration_unit");
    currentDefaultValue = parseInt(value, 10) || 60;
    currentDefaultUnit = unit || "days";
    display.textContent = formatDurationDisplay(currentDefaultValue, currentDefaultUnit);
  }catch(e){
    display.textContent = "Errore caricamento";

const DURATION_UNITS = {
  giorni:    { label: "Giorni",    max: 31 },
  settimane: { label: "Settimane", max: 52 },
  mesi:      { label: "Mesi",      max: 12 }
};

function openDurationPicker(currentValue, currentUnitPg){
  let selectedUnit = PGUNIT_TO_SEGMENT[currentUnitPg] || "giorni";
  let selectedValue = Math.min(Math.max(currentValue, 1), DURATION_UNITS[selectedUnit].max);

  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal-box">
      <p style="font-size:19px;font-weight:700;color:var(--text);margin:0 0 18px">Cambia durata</p>
      <div class="segmented" id="unitSegmented">
        <button data-unit="giorni">Giorni</button>
        <button data-unit="settimane">Settimane</button>
        <button data-unit="mesi">Mesi</button>
      </div>
      <div class="drum-wrapper">
        <div class="drum-highlight"></div>
        <div class="drum" id="valueDrum"></div>
      </div>
      <p class="status-sub" id="durationPreview" style="margin-bottom:18px"></p>
      <button class="btn btn-primary" id="confirmDurationBtn">Salva durata</button>
      <button class="btn btn-secondary" id="cancelDurationBtn" style="margin-top:10px">Annulla</button>
    </div>`;
  document.body.appendChild(overlay);

  const drumEl = document.getElementById("valueDrum");
  const previewEl = document.getElementById("durationPreview");
  const segmentedEl = document.getElementById("unitSegmented");

  function updatePreview(){
    const pgUnit = SEGMENT_TO_PGUNIT[selectedUnit];
    previewEl.textContent = `Durata selezionata: ${formatDurationDisplay(selectedValue, pgUnit)}`;
  }

  function highlightSelectedItem(value){
    drumEl.querySelectorAll(".drum-item").forEach(el => {
      el.classList.toggle("selected", parseInt(el.dataset.value, 10) === value);
    });
  }

  function buildDrum(unit, initial){
    const max = DURATION_UNITS[unit].max;
    let html = "";
    for(let i = 1; i <= max; i++){
      html += `<div class="drum-item" data-value="${i}">${i}</div>`;
    }
    drumEl.innerHTML = html;

    const itemHeight = 44;
    const idx = Math.min(Math.max(initial, 1), max) - 1;
    drumEl.scrollTop = idx * itemHeight;
    selectedValue = idx + 1;
    highlightSelectedItem(selectedValue);
    updatePreview();

    let scrollTimeout;
    drumEl.onscroll = () => {
      clearTimeout(scrollTimeout);
      scrollTimeout = setTimeout(() => {
        const rawIdx = Math.round(drumEl.scrollTop / itemHeight);
        const clamped = Math.min(Math.max(rawIdx, 0), max - 1);
        drumEl.scrollTo({ top: clamped * itemHeight, behavior: "smooth" });
        selectedValue = clamped + 1;
        highlightSelectedItem(selectedValue);
        updatePreview();
      }, 120);
    };
  }

  function setActiveSegment(unit){
    segmentedEl.querySelectorAll("button").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.unit === unit);
    });
  }

  segmentedEl.querySelectorAll("button").forEach(btn => {
    btn.onclick = () => {
      selectedUnit = btn.dataset.unit;
      setActiveSegment(selectedUnit);
      buildDrum(selectedUnit, selectedValue);
    };
  });

  setActiveSegment(selectedUnit);
  buildDrum(selectedUnit, selectedValue);

  document.getElementById("cancelDurationBtn").onclick = () => closeModal(overlay);
  document.getElementById("confirmDurationBtn").onclick = async () => {
    const btn = document.getElementById("confirmDurationBtn");
    const pgUnit = SEGMENT_TO_PGUNIT[selectedUnit];
    btn.textContent = "Salvataggio…";
    try{
      await sbSetSetting("default_duration_value", selectedValue);
      await sbSetSetting("default_duration_unit", pgUnit);
      currentDefaultValue = selectedValue;
      currentDefaultUnit = pgUnit;
      document.getElementById("currentDurationDisplay").textContent = formatDurationDisplay(selectedValue, pgUnit);
      closeModal(overlay);

      const hasActive = await sbHasActiveCoins();
      if(hasActive){
        showApplyScopeModal(async (applyToActive) => {
          if(applyToActive){
            try{
              await sbApplyDurationToActiveCoins(selectedValue, pgUnit);
            }catch(e){
              alert("Errore durante l'aggiornamento delle monete già attive.");
            }
          }
          loadCoinList();
        });
      }else{
        loadCoinList();
      }
    }catch(e){
      btn.textContent = "Salva durata";
      alert("Errore durante il salvataggio.");
    }
  };
}

// Calcola i numeri della dashboard a partire dall'elenco completo delle coin.
// Chiave data locale (YYYY-MM-DD) senza il bug del fuso orario che si ha
// usando toISOString() su un Date costruito in ora locale.
function localDateKey(date){
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

function mondayOfWeek(date){
  const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const day = d.getDay(); // 0 = domenica, 1 = lunedì, ...
  const diff = (day === 0 ? -6 : 1) - day; // porta al lunedì di quella settimana
  d.setDate(d.getDate() + diff);
  return d;
}

function computeStats(coins){
  const now = new Date();
  const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);

  let active = 0, neverUsed = 0, expired = 0, thisWeek = 0, thisMonth = 0;
  const activationsByDate = {};
  const activationsByWeek = {};
  const activationsByMonth = {};

  coins.forEach(c => {
    const expiry = effectiveExpiry(c);
    if(!c.first_scan_at){
      neverUsed++;
    }else if(expiry && now >= expiry){
      expired++;
    }else{
      active++;
    }
    if(c.first_scan_at){
      const activatedAt = new Date(c.first_scan_at);
      if(activatedAt >= weekAgo) thisWeek++;
      if(activatedAt >= monthStart) thisMonth++;

      const dateKey = localDateKey(activatedAt);
      activationsByDate[dateKey] = (activationsByDate[dateKey] || 0) + 1;

      const weekKey = localDateKey(mondayOfWeek(activatedAt));
      activationsByWeek[weekKey] = (activationsByWeek[weekKey] || 0) + 1;

      const monthKey = `${activatedAt.getFullYear()}-${String(activatedAt.getMonth() + 1).padStart(2, "0")}`;
      activationsByMonth[monthKey] = (activationsByMonth[monthKey] || 0) + 1;
    }
  });

  let bestWeek = null;
  Object.entries(activationsByWeek).forEach(([weekStartKey, count]) => {
    if(!bestWeek || count > bestWeek.count){
      const [y, m, d] = weekStartKey.split("-").map(Number);
      const start = new Date(y, m - 1, d);
      const end = new Date(start.getTime() + 6 * 24 * 60 * 60 * 1000);
      bestWeek = { start, end, count };
    }
  });

  let bestMonth = null;
  Object.entries(activationsByMonth).forEach(([monthKey, count]) => {
    if(!bestMonth || count > bestMonth.count){
      const [y, m] = monthKey.split("-").map(Number);
      bestMonth = { year: y, month: m - 1, count };
    }
  });

  // Dati operativi in più: quante coin scadranno a breve (utile per sapere
  // se serve rinnovarle) e quante sono attive ma non ancora reclamate da un
  // telefono (utile per capire se qualche cliente non ha ancora aperto il link).
  const in7Days = new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000);
  let expiringSoon = 0, pendingDevice = 0;
  coins.forEach(c => {
    const expiry = effectiveExpiry(c);
    if(c.first_scan_at && expiry && expiry > now && expiry <= in7Days) expiringSoon++;
    if(c.first_scan_at && !c.device_id && (!expiry || now < expiry)) pendingDevice++;
  });
  const activationRate = coins.length > 0 ? Math.round(((active + expired) / coins.length) * 100) : 0;

  return {
    total: coins.length, active, neverUsed, expired, thisWeek, thisMonth,
    activationsByDate, activationsByMonth, bestWeek, bestMonth,
    expiringSoon, pendingDevice, activationRate
  };
}

const MESI_LUNGHI = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
const MESI_BREVI = ["gen","feb","mar","apr","mag","giu","lug","ago","set","ott","nov","dic"];

function bestWeekLabel(bestWeek){
  if(!bestWeek || !bestWeek.count) return null;
  const fmt = d => `${d.getDate()} ${MESI_BREVI[d.getMonth()]}`;
  return `${fmt(bestWeek.start)} – ${fmt(bestWeek.end)} · ${bestWeek.count} attivazion${bestWeek.count === 1 ? "e" : "i"}`;
}

function bestMonthLabel(bestMonth){
  if(!bestMonth || !bestMonth.count) return null;
  return `${MESI_LUNGHI[bestMonth.month]} ${bestMonth.year} · ${bestMonth.count} attivazion${bestMonth.count === 1 ? "e" : "i"}`;
}

// Calendario navigabile: mostra il mese/anno indicati (di default quello
// corrente), con il giorno di oggi evidenziato e un puntino sui giorni in
// cui è stata attivata almeno una VirtualCoin. year/month sono lo stato
// "in visualizzazione", separato dal mese solare corrente.
let statsSelectedDayKey = null; // giorno selezionato nel calendario

function renderCalendarHtml(activationsByDate, year, month){
  const now = new Date();
  const todayKey = localDateKey(now);

  const firstOfMonth = new Date(year, month, 1);
  const startOffset = (firstOfMonth.getDay() + 6) % 7; // 0 = lunedì
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  let cells = "";
  for(let i = 0; i < startOffset; i++){
    cells += `<div class="calendar-cell calendar-cell-empty"></div>`;
  }
  for(let day = 1; day <= daysInMonth; day++){
    const dateObj = new Date(year, month, day);
    const dateKey = localDateKey(dateObj);
    const isToday = dateKey === todayKey;
    const isSelected = dateKey === statsSelectedDayKey;
    const count = activationsByDate[dateKey] || 0;
    // Ogni giorno è un vero pulsante: toccandolo (anche nei mesi passati)
    // compare sotto il dettaglio delle attivazioni di quel giorno.
    cells += `
      <button type="button" class="calendar-cell${isToday ? " calendar-cell-today" : ""}${isSelected ? " calendar-cell-selected" : ""}" data-daykey="${dateKey}" data-count="${count}" data-day="${day}">
        <span class="calendar-day-number">${day}</span>
        ${count > 0 ? `<span class="calendar-dot"></span>` : ""}
      </button>`;
  }

  return `
    <div class="card stats-calendar-card">
      <div class="calendar-nav">
        <button type="button" class="icon-btn icon-btn-sm" id="calendarPrevBtn" aria-label="Mese precedente">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <p class="field-label calendar-month-label" style="margin:0">${MESI_LUNGHI[month]} ${year}</p>
        <button type="button" class="icon-btn icon-btn-sm" id="calendarNextBtn" aria-label="Mese successivo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>
      <div class="calendar-weekdays"><span>L</span><span>M</span><span>M</span><span>G</span><span>V</span><span>S</span><span>D</span></div>
      <div class="calendar-grid">${cells}</div>
      <p class="calendar-day-info${statsSelectedDayKey ? "" : " calendar-day-info-empty"}" id="calendarDayInfo">${calendarDayInfoText(activationsByDate)}</p>
      ${renderMonthWeeksRecap(activationsByDate, year, month)}
    </div>`;
}

function calendarDayInfoText(activationsByDate){
  if(!statsSelectedDayKey) return "Tocca un giorno per il dettaglio";
  const [y, m, d] = statsSelectedDayKey.split("-").map(Number);
  const dateObj = new Date(y, m - 1, d);
  const count = activationsByDate[statsSelectedDayKey] || 0;
  const label = dateObj.toLocaleDateString("it-IT", { weekday: "long", day: "numeric", month: "long" });
  return `<strong>${label.charAt(0).toUpperCase() + label.slice(1)}</strong> · ${count === 0 ? "nessuna attivazione" : count === 1 ? "1 attivazione" : count + " attivazioni"}`;
}

// Riepilogo del mese visualizzato, suddiviso per settimane (lun–dom).
// Copre ciò che il grafico non mostra: il dettaglio dei mesi passati.
function renderMonthWeeksRecap(activationsByDate, year, month){
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const weeks = [];
  let current = null;
  for(let day = 1; day <= daysInMonth; day++){
    const d = new Date(year, month, day);
    if(!current || d.getDay() === 1){ // lunedì apre una nuova settimana
      current = { startDay: day, endDay: day, count: 0 };
      weeks.push(current);
    }
    current.endDay = day;
    current.count += activationsByDate[localDateKey(d)] || 0;
  }
  const maxCount = Math.max(1, ...weeks.map(w => w.count));
  const monthShort = MESI_LUNGHI[month].slice(0, 3).toLowerCase();
  const rows = weeks.map(w => `
    <div class="week-recap-row">
      <span class="week-recap-range">${w.startDay}–${w.endDay} ${monthShort}</span>
      <span class="week-recap-bar"><span class="week-recap-bar-fill" style="width:${w.count === 0 ? 0 : Math.max(8, Math.round(w.count / maxCount * 100))}%"></span></span>
      <span class="week-recap-count">${w.count}</span>
    </div>`).join("");
  return `
    <div class="week-recap">
      <p class="field-label" style="margin:0 0 10px">Riepilogo per settimane</p>
      ${rows}
    </div>`;
}

// Grafico a linee delle attivazioni negli ultimi 14 giorni, con marcatori
// dorati stile "moneta" sui singoli punti.
// Grafico attivazioni in stile app Salute di iOS: barre arrotondate,
// linea tratteggiata della media, numero grande in alto e selettore
// del periodo (Settimana / Mese / Anno).
const STATS_RANGES = {
  week:  { label: "S", days: 7 },
  month: { label: "M", days: 30 },
  year:  { label: "A" }
};
let statsChartRange = "week";
let statsChartData = null; // { activationsByDate, activationsByMonth }

function healthChartModel(range){
  const now = new Date();
  const bars = [];
  if(range === "year"){
    const monthNames = ["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"];
    for(let i = 11; i >= 0; i--){
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
      bars.push({
        count: (statsChartData.activationsByMonth || {})[key] || 0,
        label: monthNames[d.getMonth()],
        fullLabel: `${monthNames[d.getMonth()]} ${d.getFullYear()}`,
        isCurrent: i === 0
      });
    }
    return { bars, unit: "mese", labelEvery: 2 };
  }
  const days = STATS_RANGES[range].days;
  const weekdayNames = ["D","L","M","M","G","V","S"];
  for(let i = days - 1; i >= 0; i--){
    const d = new Date(now.getFullYear(), now.getMonth(), now.getDate() - i);
    bars.push({
      count: statsChartData.activationsByDate[localDateKey(d)] || 0,
      label: range === "week" ? weekdayNames[d.getDay()] : String(d.getDate()),
      fullLabel: d.toLocaleDateString("it-IT", { weekday: "short", day: "numeric", month: "short" }),
      isCurrent: i === 0
    });
  }
  return { bars, unit: "giorno", labelEvery: range === "week" ? 1 : 5 };
}

let hcCurrentBars = []; // barre correnti, lette dal tooltip interattivo

function renderHealthChartSvg(range){
  const { bars, unit, labelEvery } = healthChartModel(range);
  hcCurrentBars = bars;
  const total = bars.reduce((a, b) => a + b.count, 0);
  const avg = total / bars.length;
  const maxCount = Math.max(1, ...bars.map(b => b.count));

  const width = 320, height = 168, padL = 6, padR = 34, padT = 10, padB = 22;
  const chartW = width - padL - padR;
  const chartH = height - padT - padB;
  const slot = chartW / bars.length;
  const barW = Math.min(slot * 0.55, 22);
  const yFor = c => padT + chartH - (c / maxCount) * chartH;

  // Griglia orizzontale con i valori a destra, come in Salute
  const gridVals = maxCount <= 2 ? [0, maxCount] : [0, Math.round(maxCount / 2), maxCount];
  const grid = [...new Set(gridVals)].map(v => {
    const y = yFor(v);
    return `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${width - padR + 4}" y2="${y.toFixed(1)}" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
      <text x="${width - 4}" y="${(y + 3).toFixed(1)}" font-size="9" fill="rgba(244,240,248,0.45)" text-anchor="end">${v}</text>`;
  }).join("");

  // Barre: cime arrotondate, gradiente rosa; il periodo corrente più acceso,
  // i valori a zero mostrano solo un piccolo segno alla base.
  const barsSvg = bars.map((b, i) => {
    const cx = padL + slot * i + slot / 2;
    const x = cx - barW / 2;
    if(b.count === 0){
      return `<rect x="${x.toFixed(1)}" y="${(padT + chartH - 3).toFixed(1)}" width="${barW.toFixed(1)}" height="3" rx="1.5" fill="rgba(255,255,255,0.14)"/>`;
    }
    const y = yFor(b.count);
    const h = padT + chartH - y;
    const rx = Math.min(barW / 2, h / 2);
    const fill = b.isCurrent ? "url(#hcBarHot)" : "url(#hcBar)";
    return `<rect class="hc-bar" data-i="${i}" x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${h.toFixed(1)}" rx="${rx.toFixed(1)}" fill="${fill}"/>`;
  }).join("");

  // Fasce invisibili a tutta altezza: rendono facile "prendere" ogni colonna
  // col mouse o col dito, anche dove la barra è bassa o assente.
  const hitBands = bars.map((b, i) => {
    const x = padL + slot * i;
    return `<rect class="hc-hit" data-i="${i}" x="${x.toFixed(1)}" y="0" width="${slot.toFixed(1)}" height="${height}" fill="transparent"/>`;
  }).join("");

  // Linea tratteggiata della media (solo se c'è almeno un dato)
  const avgLine = total > 0 ? (() => {
    const y = yFor(avg);
    return `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${width - padR + 4}" y2="${y.toFixed(1)}" stroke="rgba(244,215,139,0.85)" stroke-width="1.5" stroke-dasharray="4 4"/>`;
  })() : "";

  const labels = bars.map((b, i) => {
    if(labelEvery > 1 && i % labelEvery !== 0 && !b.isCurrent) return "";
    const cx = padL + slot * i + slot / 2;
    const w = b.isCurrent ? "700" : "400";
    const c = b.isCurrent ? "rgba(244,240,248,0.9)" : "rgba(244,240,248,0.5)";
    return `<text x="${cx.toFixed(1)}" y="${height - 6}" font-size="9" font-weight="${w}" fill="${c}" text-anchor="middle">${b.label}</text>`;
  }).join("");

  return { total, avg, svg: `<svg viewBox="0 0 ${width} ${height}" style="width:100%; height:auto; display:block;">
    <defs>
      <linearGradient id="hcBar" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="rgba(230,160,191,0.85)"/><stop offset="100%" stop-color="rgba(194,89,127,0.75)"/>
      </linearGradient>
      <linearGradient id="hcBarHot" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#e6a0bf"/><stop offset="100%" stop-color="#da739e"/>
      </linearGradient>
    </defs>
    ${grid}
    ${barsSvg}
    ${avgLine}
    ${labels}
    ${hitBands}
  </svg>` };
}

// Tooltip in stile Salute: passando il mouse (o il dito) su una colonna
// mostra la data completa e le attivazioni di quel giorno/mese.
function attachChartTooltip(){
  const wrap = document.querySelector(".hc-chart-wrap");
  const tip = document.getElementById("hcTooltip");
  if(!wrap || !tip) return;
  const svg = wrap.querySelector("svg");
  let currentI = -1;

  function show(i, clientX){
    const b = hcCurrentBars[i];
    if(!b) return;
    if(i !== currentI){
      currentI = i;
      tip.innerHTML = `<span class="hc-tip-date">${b.fullLabel}</span><span class="hc-tip-count">${b.count}</span> ${b.count === 1 ? "attivazione" : "attivazioni"}`;
      // evidenzia la barra attiva
      wrap.querySelectorAll(".hc-bar").forEach(r => r.classList.toggle("hc-bar-focus", r.dataset.i == i));
    }
    tip.classList.remove("hidden");
    const wr = wrap.getBoundingClientRect();
    const tw = tip.offsetWidth;
    let x = clientX - wr.left - tw / 2;
    x = Math.max(4, Math.min(x, wr.width - tw - 4));
    tip.style.transform = `translate3d(${x}px, 0, 0)`;
  }
  function hide(){
    currentI = -1;
    tip.classList.add("hidden");
    wrap.querySelectorAll(".hc-bar").forEach(r => r.classList.remove("hc-bar-focus"));
  }
  function handle(e){
    const pt = e.touches ? e.touches[0] : e;
    const el = document.elementFromPoint(pt.clientX, pt.clientY);
    const band = el && el.closest ? el.closest("[data-i]") : null;
    if(band){ show(Number(band.dataset.i), pt.clientX); }
  }
  svg.addEventListener("mousemove", handle);
  svg.addEventListener("mouseleave", hide);
  svg.addEventListener("touchstart", handle, { passive: true });
  svg.addEventListener("touchmove", handle, { passive: true });
  svg.addEventListener("touchend", hide);
}

function attachStatsRangeSegmented(){
  const seg = document.getElementById("statsRangeSegmented");
  if(!seg) return;
  positionSegmentedThumb(seg, true);
  // Tocco o trascinamento: la pillola scivola con la sua transizione, e al
  // rilascio il corpo del grafico fa un crossfade morbido — dissolve in
  // uscita, si aggiorna, e rientra risalendo dolcemente.
  makeSegmentedDraggable(seg, btn => {
    if(btn.dataset.range === statsChartRange) return;
    statsChartRange = btn.dataset.range;
    const body = document.getElementById("hcChartBody");
    if(!body) return;
    body.classList.add("hc-swap");
    setTimeout(() => {
      body.innerHTML = renderHealthChartBodyInner(statsChartRange);
      attachChartTooltip();
      requestAnimationFrame(() => requestAnimationFrame(() => body.classList.remove("hc-swap")));
    }, 170);
  });
}
