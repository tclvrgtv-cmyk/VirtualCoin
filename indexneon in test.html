let allCoinsCache = [];

async function loadCoinList(){
  let listEl = document.getElementById("coinList");
  if(!listEl) return; // si è navigato altrove (es. Statistiche) prima che il caricamento finisse
  listEl.innerHTML = `<div class="loading coin-list-empty">Caricamento…</div>`;

  try{
    allCoinsCache = await sbSelectAllCoins();
  }catch(e){
    listEl = document.getElementById("coinList");
    if(!listEl) return; // idem, controllato di nuovo dopo l'attesa di rete
    listEl.innerHTML = `<div class="error-text coin-list-empty">Errore nel caricamento delle VirtualCoin.</div>`;
    return;
  }

  renderFilteredCoinList();
}

// Applica ricerca testuale + filtro di stato alla cache locale delle coin,
// senza richiedere una nuova chiamata a Supabase ogni volta.
// Fa ripartire una dissolvenza morbida sulla lista ogni volta che si
// ridisegna (cambio filtro, cambio vista) invece di uno scatto istantaneo.
function fadeInList(listEl){
  listEl.classList.remove("list-fade-in");
  void listEl.offsetWidth; // forza il reflow per far ripartire l'animazione
  listEl.classList.add("list-fade-in");
}

function renderFilteredCoinList(){
  const listEl = document.getElementById("coinList");
  if(!listEl) return;

  if(!allCoinsCache.length){
    listEl.innerHTML = `<div class="loading coin-list-empty">Nessuna VirtualCoin registrata.</div>`;
    fadeInList(listEl);
    return;
  }

  const activeFilterBtn = document.querySelector("#coinFilterSegmented button.active");
  const filter = activeFilterBtn ? activeFilterBtn.dataset.filter : "all";

  const now = new Date();
  let coins = allCoinsCache.filter(c => {
    const expiry = effectiveExpiry(c);
    if(filter === "never" && c.first_scan_at) return false;
    if(filter === "active" && (!c.first_scan_at || (expiry && now >= expiry))) return false;
    if(filter === "expired" && !(c.first_scan_at && expiry && now >= expiry)) return false;
    return true;
  });

  // Ordine: Attive prima, poi Mai usate, poi Scadute — così con il filtro
  // "Tutte" selezionato la lista non risulta disordinata.
  const statusRank = c => {
    const expiry = effectiveExpiry(c);
    if(!c.first_scan_at) return 1; // mai usata
    if(expiry && now >= expiry) return 2; // scaduta
    return 0; // attiva
  };
  coins = coins.slice().sort((a, b) => statusRank(a) - statusRank(b));

  if(!coins.length){
    listEl.innerHTML = `<div class="loading coin-list-empty">Nessuna VirtualCoin in questa categoria.</div>`;
    fadeInList(listEl);
    return;
  }

  listEl.innerHTML = coins.map(c => coinRowHtml(c.id, c)).join("");
  fadeInList(listEl);

  coins.forEach(c => {
    const row = document.getElementById(`row-${cssId(c.id)}`);
    const manualBtn = row.querySelector(".btn-manual-activate");
    if(manualBtn) manualBtn.onclick = () => handleManualActivate(c);
    row.querySelector(".btn-reset").onclick = () => handleReset(c);
    row.querySelector(".btn-unlock-device").onclick = (e) => {
      e.stopPropagation();
      closeAllCoinOverflowMenus();
      handleUnlockDevice(c);
    };
    row.querySelector(".btn-delete-coin").onclick = (e) => {
      e.stopPropagation();
      closeAllCoinOverflowMenus();
      handleDeleteCoin(c);
    };
    row.querySelector(".btn-view-link").onclick = (e) => {
      e.stopPropagation();
      showCoinLinkPopup(c);
    };
    row.querySelector(".btn-overflow-menu").onclick = (e) => {
      e.stopPropagation();
      const menu = row.querySelector(".coin-overflow-menu");
      const wasHidden = menu.classList.contains("hidden");
      closeAllCoinOverflowMenus();
      if(wasHidden) menu.classList.remove("hidden");
    };
    // In modalità elenco, la riga si espande/comprime al tap per mostrare
    // data e pulsanti — in modalità schede resta sempre tutto visibile.
    row.querySelector(".coin-row-top").onclick = () => {
      if(document.getElementById("coinList").classList.contains("coin-list-as-list")){
        // Misura l'altezza reale del contenuto e anima fino a quella:
        // la transizione dura così esattamente .32s con la curva prevista,
        // senza il vecchio tetto fisso di 220px che deformava l'easing.
        const details = row.querySelector(".coin-row-details");
        const expanding = !row.classList.contains("expanded");
        if(details && expanding){
          details.style.setProperty("--details-h", details.scrollHeight + "px");
        }
        row.classList.toggle("expanded", expanding);
      }
    };
  });

  // Chiude qualunque menu ⋮ aperto se si tocca altrove nella pagina.
  document.removeEventListener("click", closeAllCoinOverflowMenus);
  document.addEventListener("click", closeAllCoinOverflowMenus);
}

function statusBadge(coin){

  if(!coin.device_id) return `<span class="badge badge-amber">Attiva · in attesa</span>`;
  return `<span class="badge badge-green">Attiva</span>`;
}

function fmtDate(iso){
  if(!iso) return "—";

function derivedDurationLabel(coin){
  if(!coin.first_scan_at){
    return `${formatDurationDisplay(currentDefaultValue, currentDefaultUnit)} (non ancora attivata)`;
  }
  if(coin.duration_value && coin.duration_unit){
    return formatDurationDisplay(coin.duration_value, coin.duration_unit);
  }
  return "—";
}

function generateSessionCode(){
  let code = "";
  for(let i = 0; i < 6; i++){
    code += CODE_CHARSET[Math.floor(Math.random() * CODE_CHARSET.length)];
  }
  return code;
}

// Genera un session_code garantito univoco, riprovando fino a 5 volte in
// caso di collisione (evita che due clienti diversi vedano lo stesso codice).
async function generateUniqueSessionCode(){
  let sessionCode;
  let attempts = 0;
  while(attempts < 5){
    sessionCode = generateSessionCode();
    const codeTaken = await sbSessionCodeExists(sessionCode);
    if(!codeTaken) break;
    attempts++;
  }
  return sessionCode;
}

function fakeDisplayCode(id){
  // Codice puramente estetico, stabile ma non riconducibile all'ID reale.
  // Serve solo a non mostrare mai l'ID vero nelle schede prima dell'attivazione.
  let hash = 0;
  for(let i = 0; i < id.length; i++){
    hash = (hash * 31 + id.charCodeAt(i)) >>> 0;
  }
  let code = "";
  for(let i = 0; i < 6; i++){
    code += CODE_CHARSET[hash % CODE_CHARSET.length];
    hash = Math.floor(hash / CODE_CHARSET.length) + i * 97;
  }
  return code;
}

async function handleCreateCoin(){
  const btn = document.getElementById("createCoinBtn");
  btn.textContent = "Generazione in corso…";
  btn.disabled = true;

  try{
    let code;
    let attempts = 0;
    while(attempts < 5){
      code = generateCoinId();
      const existing = await sbSelectCoin(code);
      if(!existing) break;
      attempts++;
    }

    let sessionCode = await generateUniqueSessionCode();

    await sbInsertCoin(code, { session_code: sessionCode });
    showGeneratedLinkPopup(code);
    loadCoinList();
  }catch(e){
    alert("Errore durante la generazione della VirtualCoin. Riprova.");
  }finally{
    btn.textContent = "Genera nuova VirtualCoin";
    btn.disabled = false;
  }
}

      <p style="font-size:19px;font-weight:700;color:var(--text);margin:0 0 4px">Link VirtualCoin</p>
      <p style="margin-bottom:14px">Il link copiato è quello vero, anche se qui sotto vedi il codice del cliente:</p>
      <p style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13.5px;background:rgba(255,255,255,0.08);padding:12px 14px;border-radius:14px;word-break:break-all;color:var(--text);text-align:left;border:1px solid var(--glass-border)">${fakeUrl}</p>
      <button class="btn btn-primary" id="copyExistingLinkBtn" style="margin-top:16px">Copia link</button>
      <button class="btn btn-secondary" id="closeExistingLinkPopup" style="margin-top:10px">Chiudi</button>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById("copyExistingLinkBtn").onclick = () => {
    navigator.clipboard.writeText(realUrl).then(() => {
      document.getElementById("copyExistingLinkBtn").textContent = "Copiato!";
    });
  };
  document.getElementById("closeExistingLinkPopup").onclick = () => closeModal(overlay);
}

function showGeneratedLinkPopup(code){
  const url = buildCoinUrl(code);
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="icon-circle" style="width:72px;height:72px;margin-bottom:14px;background:rgba(52,199,89,0.15);color:var(--green)">
        ${icons.check}
      </div>
      <p style="font-size:19px;font-weight:700;color:var(--text);margin:0 0 4px">VirtualCoin creata</p>
      <p style="margin-bottom:14px">Scrivi questo link sul tag NFC:</p>
      <p style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13.5px;background:rgba(255,255,255,0.08);padding:12px 14px;border-radius:14px;word-break:break-all;color:var(--text);text-align:left;border:1px solid var(--glass-border)">${url}</p>
      <button class="btn btn-primary" id="copyLinkBtn" style="margin-top:16px">Copia link</button>

      document.getElementById("copyLinkBtn").textContent = "Copiato!";

function handleReset(coin){
  const currentCode = coin.session_code || fakeDisplayCode(coin.id);
  const doReset = async () => {
    const newSessionCode = await generateUniqueSessionCode();
    await sbUpdateCoin(coin.id, { first_scan_at: null, expires_at: null, duration_value: null, duration_unit: null, session_code: newSessionCode, device_id: null });
    loadCoinList();
  };
  confirmAction(`Reset di "${currentCode}"? Tornerà riutilizzabile da zero con un nuovo codice.`, doReset);
}

function handleDeleteCoin(coin){
  const currentCode = coin.session_code || fakeDisplayCode(coin.id);
  confirmAction(`Eliminare "${currentCode}"? L'azione è definitiva e non recuperabile.`, async () => {
    await sbDeleteCoin(coin.id);
    loadCoinList();
  });
}

function handleManualActivate(coin){
  const currentCode = coin.session_code || fakeDisplayCode(coin.id);
  confirmAction(`Attivare "${currentCode}" senza NFC? Utile se il telefono del cliente non legge gli NFC. La moneta sarà subito attiva; il primo telefono che apre il link ne diventerà il proprietario.`, async () => {
    const updated = await sbUpdateCoin(coin.id, { first_scan_at: new Date().toISOString() });
    loadCoinList();
    showManualActivationPopup(updated || coin);
  });
}

// Popup mostrato SOLO dopo "Attiva senza NFC": QR code da far inquadrare al
// cliente (apre direttamente la scheda della sua VirtualCoin) più un link
// copiabile in alternativa. Il codice mostrato è quello estetico/fake, il
// link e il QR incorporano invece l'ID reale della coin.
function showManualActivationPopup(coin){
  const displayCode = coin.session_code || fakeDisplayCode(coin.id);
  const url = buildCoinUrl(coin.id);
  const qrSvg = generateQrSvg(url);

  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="icon-circle" style="width:64px;height:64px;margin-bottom:12px;background:rgba(52,199,89,0.15);color:var(--green)">
        ${icons.check}
      </div>
      <p style="font-size:19px;font-weight:700;color:var(--text);margin:0 0 4px">VirtualCoin attivata</p>
      <p style="margin-bottom:14px">Codice: <strong>${displayCode}</strong></p>
      <div class="qr-wrap">${qrSvg}</div>
      <p style="font-size:13px;color:var(--text-secondary);margin-bottom:14px">Fai inquadrare questo QR code al cliente per aprire subito la sua VirtualCoin, oppure copia il link qui sotto.</p>
      <button class="btn btn-primary" id="copyManualActivationLinkBtn">Copia link</button>
      <button class="btn btn-secondary" id="closeManualActivationPopup" style="margin-top:10px">Chiudi</button>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById("copyManualActivationLinkBtn").onclick = () => {
    navigator.clipboard.writeText(url).then(() => {
      document.getElementById("copyManualActivationLinkBtn").textContent = "Copiato!";
    });
  };
  document.getElementById("closeManualActivationPopup").onclick = () => closeModal(overlay);
}

function handleUnlockDevice(coin){
  const currentCode = coin.session_code || fakeDisplayCode(coin.id);
  confirmAction(`Cambiare dispositivo per "${currentCode}"? Il prossimo telefono che apre il link ne diventerà il proprietario.`, async () => {
    await sbUpdateCoin(coin.id, { device_id: null });
    loadCoinList();
  });
}

function confirmAction(message, onConfirm){
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal-box">
      <p>${message}</p>
      <div class="btn-row" style="margin-top:0">
        <button class="btn btn-secondary btn-small" id="modalCancel">Annulla</button>
        <button class="btn btn-danger btn-small" id="modalConfirm">Conferma</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById("modalCancel").onclick = () => closeModal(overlay);
  document.getElementById("modalConfirm").onclick = () => {
    closeModal(overlay);
    onConfirm();
  };
}

// Variante rinforzata: richiede di scrivere esattamente il codice della coin
// per abilitare il pulsante di conferma. Usata solo per azioni distruttive
// su monete GIA' USATE da un cliente reale (dati che andrebbero persi per sempre).
function confirmActionTyped(message, expectedCode, onConfirm){
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal-box">
      <p>${message}</p>
      <p style="font-size:13px;color:var(--text-secondary);margin:-10px 0 10px">Scrivi <strong>${expectedCode}</strong> per confermare:</p>
      <input type="text" id="confirmTypedInput" autocomplete="off" autocapitalize="characters" style="text-align:center;letter-spacing:2px;font-weight:700;margin-bottom:14px">
      <div class="btn-row" style="margin-top:0">
        <button class="btn btn-secondary btn-small" id="modalCancel">Annulla</button>
        <button class="btn btn-danger btn-small" id="modalConfirm" disabled style="opacity:.4">Conferma</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  const input = document.getElementById("confirmTypedInput");
  const confirmBtn = document.getElementById("modalConfirm");
  input.oninput = () => {
    const match = input.value.trim().toUpperCase() === expectedCode.toUpperCase();
    confirmBtn.disabled = !match;
    confirmBtn.style.opacity = match ? "1" : ".4";
  };
  document.getElementById("modalCancel").onclick = () => closeModal(overlay);
  confirmBtn.onclick = () => {
    if(confirmBtn.disabled) return;
    closeModal(overlay);
    onConfirm();
  };
}

(function init(){
  setupPullToRefresh();
  const params = new URLSearchParams(window.location.search);
  if(params.has("admin")){
    renderAdmin();
  }else if(params.has("c")){
    const coinId = params.get("c");
    sessionStorage.setItem("vc_active_coin", coinId);
    renderCoinView(coinId);
  }else{
    const rememberedCoin = sessionStorage.getItem("vc_active_coin");
    if(rememberedCoin){
      renderCoinView(rememberedCoin);
    }else{
      renderAdmin();
    }
  }
})();
</script>
